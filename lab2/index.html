<!DOCTYPE html>
<html lang="en">
  <head>
    <title>GPA Calculator</title>
    <script src="script.js"></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
     <h1>GPA Calculator</h1>
      <form method="post" action="calculate.php" onsubmit="return validateForm()">
      <br><br>
      <div id="courses">

    <input type="text" name="course[]" placeholder="Course Name">
    <input type="number" name="credits[]" placeholder="Credits" min="1" max="5">

    <select name="grade[]">
        <option value="">Select Grade</option>
        <option value="4">A</option>
        <option value="3">B</option>
        <option value="2">C</option>
        <option value="1">D</option>
        <option value="0">F</option>
    </select>

    <br><br>

</div>
<button type="button" onclick="addCourse()">Add Course</button>
<br><br>
<input type="submit" value="Calculate GPA">
</form>
  </body>
</html>
